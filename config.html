<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Radar Configuration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="./tableau.extensions.1.15.0.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            font-size: 14px;
            background: #f8fafc;
            color: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #ffffff;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            max-width: 580px;
            width: 100%;
        }
        h3 {
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 20px;
        }
        .section-title {
            font-weight: 600;
            margin-top: 18px;
            margin-bottom: 12px;
            border-left: 4px solid #0284c7;
            padding-left: 8px;
            color: #0284c7;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .grid-custom {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 12px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        label {
            font-weight: 500;
            color: #475569;
            font-size: 13px;
        }
        select, input[type="text"], input[type="number"] {
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            padding: 9px 12px;
            font-size: 14px;
            font-family: inherit;
            background-color: #f8fafc;
            color: #0f172a;
            transition: all 0.2s ease-in-out;
            width: 100%;
            outline: none;
        }
        select:focus, input[type="text"]:focus, input[type="number"]:focus {
            border-color: #0284c7;
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.15);
            background-color: #ffffff;
        }
        input[type="color"] {
            -webkit-appearance: none;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            width: 100%;
            height: 38px;
            cursor: pointer;
            background: none;
            padding: 0;
            overflow: hidden;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 6px;
        }
        button.btn-save {
            background-color: #0284c7;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 20px;
            box-shadow: 0 4px 6px -1px rgba(2, 132, 199, 0.2), 0 2px 4px -2px rgba(2, 132, 199, 0.2);
        }
        button.btn-save:hover {
            background-color: #0369a1;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(2, 132, 199, 0.3);
        }
        button.btn-save:active {
            transform: translateY(0);
        }
        hr {
            margin: 20px 0;
            border: 0;
            border-top: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>

    <main class="container">
        <h3>🎯 Pengaturan Radar Chart</h3>
        
        <div class="section-title">Label & Informasi</div>
        <div class="grid-custom" style="grid-template-columns: 1fr;">
            <div class="form-group">
                <label for="datasetLabel">Label Dataset (Single Dataset):</label>
                <input type="text" id="datasetLabel" placeholder="Contoh: Nilai Indikator">
            </div>
        </div>

        <div class="section-title">Desain & Warna (Styling)</div>
        <div class="grid-custom" id="single-color-section">
            <div class="form-group">
                <label for="borderColor">Warna Garis:</label>
                <input type="color" id="borderColor" value="#36a2eb">
            </div>
            <div class="form-group">
                <label for="bgColorPick">Warna Area Dalam (Isi):</label>
                <select id="bgColorPick">
                    <option value="rgba(54, 162, 235, 0.2)">Biru Transparan</option>
                    <option value="rgba(255, 99, 132, 0.2)">Merah Transparan</option>
                    <option value="rgba(75, 192, 192, 0.2)">Hijau Toska Transparan</option>
                    <option value="rgba(255, 206, 86, 0.2)">Kuning Transparan</option>
                </select>
            </div>
        </div>

        <div id="multi-color-section" style="display: none;">
            <div class="grid-custom" id="group-colors-container">
                <!-- Diisi dinamis -->
            </div>
        </div>

        <div class="grid-custom">
            <div class="form-group">
                <label for="borderWidth">Ketebalan Garis (Px):</label>
                <input type="number" id="borderWidth" value="2" min="1" max="10">
            </div>
            <div class="form-group">
                <label for="maxScale">Batas Maksimum Skala:</label>
                <input type="number" id="maxScale" placeholder="Kosongkan jika Otomatis">
            </div>
        </div>

        <div class="grid-custom" style="grid-template-columns: 1fr;">
            <div class="form-group">
                <label for="valueFormat">Format Angka pada Sumbu & Tooltip:</label>
                <select id="valueFormat">
                    <option value="number">Angka Desimal Biasa (0.1, 0.2, dll)</option>
                    <option value="percentage">Persentase (10%, 20%, dll)</option>
                </select>
            </div>
        </div>

        <hr>
        <button class="btn-save" onclick="saveConfiguration()">Simpan Pengaturan</button>
    </main>

    <script>
        let activeGroups = [];
        let savedSettings = {};

        // Inisialisasi jendela dialog ekstensi
        tableau.extensions.initializeDialogAsync().then((initialPayload) => {
            savedSettings = tableau.extensions.settings.getAll();
            
            if (initialPayload) {
                try {
                    const parsed = JSON.parse(initialPayload);
                    if (parsed && Array.isArray(parsed.activeGroups)) {
                        activeGroups = parsed.activeGroups;
                    }
                } catch (e) {
                    console.error("Gagal men-parse payload:", e);
                }
            }

            initForm();
        });

        function initForm() {
            if (savedSettings.datasetLabel) document.getElementById('datasetLabel').value = savedSettings.datasetLabel;
            if (savedSettings.borderColor) document.getElementById('borderColor').value = savedSettings.borderColor;
            if (savedSettings.bgColorPick) document.getElementById('bgColorPick').value = savedSettings.bgColorPick;
            if (savedSettings.borderWidth) document.getElementById('borderWidth').value = savedSettings.borderWidth;
            if (savedSettings.maxScale) document.getElementById('maxScale').value = savedSettings.maxScale;
            if (savedSettings.valueFormat) document.getElementById('valueFormat').value = savedSettings.valueFormat;

            // Load groupColors
            let groupColors = {};
            if (savedSettings.groupColors) {
                try {
                    groupColors = JSON.parse(savedSettings.groupColors);
                } catch (e) {
                    console.error("Gagal men-parse groupColors:", e);
                }
            }

            if (activeGroups && activeGroups.length > 0) {
                // Sembunyikan single-color, tunjukkan multi-color
                document.getElementById('single-color-section').style.display = 'none';
                document.getElementById('multi-color-section').style.display = 'block';

                const container = document.getElementById('group-colors-container');
                container.innerHTML = '';

                // Default palette
                const PALETTE = ['#36a2eb', '#4bc0c0', '#ff6384', '#ff9f40', '#9966ff', '#ffcd56'];

                activeGroups.forEach((group, idx) => {
                    const savedColor = groupColors[group] || PALETTE[idx % PALETTE.length];

                    const formGroup = document.createElement('div');
                    formGroup.className = 'form-group';

                    const label = document.createElement('label');
                    label.htmlFor = 'color_' + idx;
                    label.innerText = `Warna Garis (${group}):`;

                    const input = document.createElement('input');
                    input.type = 'color';
                    input.id = 'color_' + idx;
                    input.value = savedColor;
                    input.setAttribute('data-group', group);

                    formGroup.appendChild(label);
                    formGroup.appendChild(input);
                    container.appendChild(formGroup);
                });
            } else {
                // Tunjukkan single-color, sembunyikan multi-color
                document.getElementById('single-color-section').style.display = 'grid';
                document.getElementById('multi-color-section').style.display = 'none';
            }
        }

        // Menyimpan setting ke dalam Workbook Tableau secara permanen
        function saveConfiguration() {
            tableau.extensions.settings.set("datasetLabel", document.getElementById('datasetLabel').value);
            tableau.extensions.settings.set("borderColor", document.getElementById('borderColor').value);
            tableau.extensions.settings.set("bgColor", document.getElementById('bgColorPick').value);
            tableau.extensions.settings.set("bgColorPick", document.getElementById('bgColorPick').value);
            tableau.extensions.settings.set("borderWidth", document.getElementById('borderWidth').value);
            tableau.extensions.settings.set("maxScale", document.getElementById('maxScale').value);
            tableau.extensions.settings.set("valueFormat", document.getElementById('valueFormat').value);

            // Simpan warna multi-dataset
            if (activeGroups && activeGroups.length > 0) {
                const groupColors = {};
                activeGroups.forEach((group, idx) => {
                    const input = document.getElementById('color_' + idx);
                    if (input) {
                        groupColors[group] = input.value;
                    }
                });
                tableau.extensions.settings.set("groupColors", JSON.stringify(groupColors));
            }

            // Simpan secara asinkron lalu tutup jendela pop-up dialog
            tableau.extensions.settings.saveAsync().then(() => {
                tableau.extensions.ui.closeDialog("Sukses");
            });
        }
    </script>
</body>
</html>
