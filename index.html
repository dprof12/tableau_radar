<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Chart Replica</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./tableau.extensions.1.15.0.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; margin: 0; padding: 0; background-color: transparent; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .chart-wrapper { width: 95%; height: 95%; display: flex; justify-content: center; align-items: center; }
        #error-msg {
            display: none;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            max-width: 420px;
            width: 85%;
            margin: auto;
            color: #334155;
            font-size: 14px;
            line-height: 1.6;
        }
        #error-msg .icon {
            font-size: 36px;
            margin-bottom: 16px;
            display: block;
        }
        #error-msg .title {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 8px;
            color: #0284c7;
        }
    </style>
</head>
<body>

    <div id="error-msg">
        <span class="icon">⚙️</span>
        <div class="title" id="error-title">Konfigurasi Diperlukan</div>
        <div id="error-text">Silakan lakukan konfigurasi ekstensi terlebih dahulu melalui menu dropdown di Tableau (Klik panah kanan atas -> <b>Configure</b>).</div>
    </div>
    <div class="chart-wrapper">
        <canvas id="radarCanvas"></canvas>
    </div>

    <script>
        let myRadarChart = null;

        // Inisialisasi Ekstensi Tableau dengan callback configure
        tableau.extensions.initializeAsync({ 'configure': configure }).then(() => {
            // Jalankan fungsi fetch data
            renderRadarFromTableau();
            
            // Pasang Listener: Jika user mengubah filter di dashboard, radar otomatis update!
            const dashboard = tableau.extensions.dashboardContent.dashboard;
            dashboard.addEventListener(tableau.TableauEventType.FilterChanged, renderRadarFromTableau);
        });

        // Fungsi untuk membuka popup konfigurasi
        function configure() {
            // Menghasilkan URL absolut dinamis yang mengarah ke config.html pada direktori yang sama
            const popupUrl = new URL('config.html', window.location.href).href;
            
            tableau.extensions.ui.displayDialogAsync(popupUrl, "", {
                height: 550,
                width: 600
            }).then((closePayload) => {
                // Saat dialog ditutup, render ulang radar chart dengan data/setting yang baru disimpan
                renderRadarFromTableau();
            }).catch((error) => {
                if (error.errorCode !== tableau.ErrorCodes.DialogClosedByUser) {
                    console.error("Gagal membuka dialog:", error.message);
                }
            });
        }

        function showError(message, title = "Kesalahan Ekstensi") {
            document.getElementById('error-title').innerText = title;
            document.getElementById('error-text').innerHTML = message;
            document.getElementById('error-msg').style.display = 'block';
            document.querySelector('.chart-wrapper').style.display = 'none';
        }

        function hideError() {
            document.getElementById('error-msg').style.display = 'none';
            document.querySelector('.chart-wrapper').style.display = 'flex';
        }

        async function renderRadarFromTableau() {
            // 1. Ambil Pengaturan UI yang disimpan dari config.html
            const settings = tableau.extensions.settings.getAll();
            
            if (!settings.targetSheet || !settings.catColumn || !settings.valColumn) {
                showError("Silakan lakukan konfigurasi ekstensi terlebih dahulu melalui menu dropdown di Tableau (Klik panah kanan atas -> <b>Configure</b>).", "Konfigurasi Diperlukan");
                return;
            }

            // Ambil preferensi desain dari UI setting (Jika belum diatur, gunakan default)
            const bgColor = settings.bgColor || 'rgba(54, 162, 235, 0.2)';
            const borderColor = settings.borderColor || 'rgba(54, 162, 235, 1)';
            const borderW = parseInt(settings.borderWidth) || 2;
            const maxScale = (settings.maxScale && !isNaN(settings.maxScale)) ? parseInt(settings.maxScale) : undefined;

            // 2. Koneksi ke Worksheet Tableau
            const dashboard = tableau.extensions.dashboardContent.dashboard;
            const worksheet = dashboard.worksheets.find(ws => ws.name === settings.targetSheet);
            
            if (!worksheet) {
                showError(`Worksheet bernama "<b>${settings.targetSheet}</b>" tidak ditemukan di dashboard ini. Harap konfigurasi ulang.`, "Worksheet Tidak Ditemukan");
                return;
            }

            try {
                // Ambil Summary Data dari Tableau
                const dataTable = await worksheet.getSummaryDataAsync();
                
                // Cari indeks kolom berdasarkan nama kolom yang dipilih di UI
                const catCol = dataTable.columns.find(col => col.fieldName === settings.catColumn);
                const valCol = dataTable.columns.find(col => col.fieldName === settings.valColumn);

                if (!catCol || !valCol) {
                    showError("Kolom kategori atau nilai yang dikonfigurasi tidak dapat ditemukan dalam data sheet. Silakan lakukan konfigurasi ulang.", "Kolom Tidak Ditemukan");
                    return;
                }

                const catIdx = catCol.index;
                const valIdx = valCol.index;

                let labels = [];
                let dataValues = [];

                // Ekstrak data nyata dari Tableau
                dataTable.data.forEach(row => {
                    labels.push(row[catIdx].formattedValue);
                    dataValues.push(row[valIdx].value);
                });

                hideError();

                // 3. Render ke Chart.js
                const ctx = document.getElementById('radarCanvas').getContext('2d');
                
                if (myRadarChart) {
                    // Jika grafik sudah ada, tinggal update datanya (Animasi mulus)
                    myRadarChart.data.labels = labels;
                    myRadarChart.data.datasets[0].data = dataValues;
                    myRadarChart.data.datasets[0].backgroundColor = bgColor;
                    myRadarChart.data.datasets[0].borderColor = borderColor;
                    myRadarChart.data.datasets[0].borderWidth = borderW;
                    myRadarChart.options.scales.r.suggestedMax = maxScale;
                    myRadarChart.update();
                } else {
                    // Jika baru pertama kali dimuat, buat objek grafik baru
                    myRadarChart = new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: settings.datasetLabel || 'Nilai Indikator',
                                data: dataValues,
                                backgroundColor: bgColor,
                                borderColor: borderColor,
                                borderWidth: borderW,
                                pointBackgroundColor: borderColor
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                r: {
                                    suggestedMin: 0,
                                    suggestedMax: maxScale,
                                    ticks: { font: { size: 10 } },
                                    pointLabels: { font: { size: 11, weight: 'bold' } }
                                }
                            }
                        }
                    });
                }
            } catch (err) {
                showError("Gagal mengambil data dari worksheet Tableau: " + err.message, "Gagal Mengambil Data");
            }
        }
    </script>
</body>
</html>
