<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Chart Replica</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./tableau.extensions.1.15.0.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; margin: 0; padding: 0; background-color: transparent; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .chart-wrapper { width: 95%; height: 95%; display: flex; justify-content: center; align-items: center; }
        #error-msg {
            display: none;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            max-width: 420px;
            width: 85%;
            margin: auto;
            color: #334155;
            font-size: 14px;
            line-height: 1.6;
        }
        #error-msg .icon {
            font-size: 36px;
            margin-bottom: 16px;
            display: block;
        }
        #error-msg .title {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 8px;
            color: #0284c7;
        }
    </style>
</head>
<body>

    <div id="error-msg">
        <span class="icon">⚙️</span>
        <div class="title" id="error-title">Konfigurasi Diperlukan</div>
        <div id="error-text">Silakan lakukan konfigurasi ekstensi terlebih dahulu (Pilih Mark Type -> <b>Configure</b>).</div>
    </div>
    <div class="chart-wrapper">
        <canvas id="radarCanvas"></canvas>
    </div>

    <script>
        let myRadarChart = null;
        let activeGroups = [];

        function hexToRgba(hex, alpha) {
            hex = hex.replace('#', '');
            if (hex.length === 3) {
                hex = hex.split('').map(char => char + char).join('');
            }
            const r = parseInt(hex.substring(0, 2), 16);
            const g = parseInt(hex.substring(2, 4), 16);
            const b = parseInt(hex.substring(4, 6), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // Inisialisasi Ekstensi Tableau dengan callback configure
        tableau.extensions.initializeAsync({ 'configure': configure }).then(() => {
            // Jalankan fungsi fetch data
            renderRadarFromTableau();
            
            // Pasang Listener pada worksheet aktif: jika data atau filter berubah, radar terupdate!
            const worksheet = tableau.extensions.worksheetContent.worksheet;
            worksheet.addEventListener(tableau.TableauEventType.FilterChanged, renderRadarFromTableau);
            worksheet.addEventListener(tableau.TableauEventType.SummaryDataChanged, renderRadarFromTableau);
        });

        // Fungsi untuk membuka popup konfigurasi
        function configure() {
            // Menghasilkan URL absolut dinamis yang mengarah ke config.html pada direktori yang sama dengan cache buster
            const popupUrl = new URL('config.html?v=' + Date.now(), window.location.href).href;
            const payload = JSON.stringify({ activeGroups: activeGroups });
            
            tableau.extensions.ui.displayDialogAsync(popupUrl, payload, {
                height: 520,
                width: 580
            }).then((closePayload) => {
                // Saat dialog ditutup, render ulang radar chart dengan data/setting yang baru disimpan
                renderRadarFromTableau();
            }).catch((error) => {
                if (error.errorCode !== tableau.ErrorCodes.DialogClosedByUser) {
                    console.error("Gagal membuka dialog:", error.message);
                }
            });
        }

        function showError(message, title = "Kesalahan Ekstensi") {
            document.getElementById('error-title').innerText = title;
            document.getElementById('error-text').innerHTML = message;
            document.getElementById('error-msg').style.display = 'block';
            document.querySelector('.chart-wrapper').style.display = 'none';
        }

        function hideError() {
            document.getElementById('error-msg').style.display = 'none';
            document.querySelector('.chart-wrapper').style.display = 'flex';
        }

        function getFieldName(encoding) {
            if (!encoding) return null;
            if (encoding.field) return encoding.field.name;
            if (encoding.fields && encoding.fields.length > 0) return encoding.fields[0].name;
            return null;
        }

        async function renderRadarFromTableau() {
            // 1. Ambil Pengaturan UI yang disimpan dari config.html
            const settings = tableau.extensions.settings.getAll();

            // Ambil preferensi desain dari UI setting (Jika belum diatur, gunakan default)
            const bgColor = settings.bgColor || 'rgba(54, 162, 235, 0.2)';
            const borderColor = settings.borderColor || 'rgba(54, 162, 235, 1)';
            const borderW = parseInt(settings.borderWidth) || 2;
            const maxScale = (settings.maxScale && !isNaN(settings.maxScale)) ? parseInt(settings.maxScale) : undefined;

            // 2. Koneksi langsung ke Worksheet aktif (Viz Extension)
            const worksheet = tableau.extensions.worksheetContent.worksheet;
            
            if (!worksheet) {
                showError("Tidak dapat terhubung dengan worksheet aktif.", "Error Worksheet");
                return;
            }

            try {
                // Ambil spesifikasi visual (pemetaan rak kustom)
                const visualSpec = await worksheet.getVisualSpecificationAsync();
                
                if (!visualSpec.marksSpecifications || visualSpec.marksSpecifications.length === 0) {
                    showError("Tidak ada spesifikasi marks yang ditemukan.", "Konfigurasi Diperlukan");
                    return;
                }

                const marksSpec = visualSpec.marksSpecifications[visualSpec.activeMarksSpecificationIndex];
                const encodings = marksSpec.encodings;

                const dimensionEncoding = encodings.find(e => e.id === 'dimension');
                const xAxisEncoding = encodings.find(e => e.id === 'x-axis');
                const measureEncoding = encodings.find(e => e.id === 'measure');

                const dimensionFieldName = getFieldName(dimensionEncoding);
                const xAxisFieldName = getFieldName(xAxisEncoding);
                const measureFieldName = getFieldName(measureEncoding);

                if (!xAxisFieldName || !measureFieldName) {
                    showError("Harap seret data ke rak <b>X-Axis</b> (kategori) dan rak <b>Measure</b> (nilai) pada Marks Card.", "Posisikan Kolom Data");
                    return;
                }

                // Ambil Summary Data dari Tableau dengan mengabaikan seleksi klik agar chart tidak runtuh/menghilang
                const dataTable = await worksheet.getSummaryDataAsync({ ignoreSelection: true });
                
                // Cari indeks kolom berdasarkan nama kolom yang didapat dari rak kustom
                const catCol = dataTable.columns.find(col => col.fieldName === xAxisFieldName);
                const valCol = dataTable.columns.find(col => col.fieldName === measureFieldName);

                if (!catCol || !valCol) {
                    showError("Kolom yang ditarik ke rak X-Axis atau Measure tidak dapat dicocokkan dengan data tabel.", "Kolom Tidak Ditemukan");
                    return;
                }

                const catIdx = catCol.index;
                const valIdx = valCol.index;

                // Cek jika ada kolom pengelompokan (rak Dimension)
                const groupCol = dimensionFieldName ? dataTable.columns.find(col => col.fieldName === dimensionFieldName) : null;
                const groupIdx = groupCol ? groupCol.index : -1;

                let labels = [];
                let datasets = [];

                if (groupIdx === -1) {
                    // Single Dataset
                    activeGroups = [];
                    let labelsSet = [];
                    let dataValues = [];

                    dataTable.data.forEach(row => {
                        labelsSet.push(row[catIdx].formattedValue);
                        dataValues.push(row[valIdx].value);
                    });

                    labels = labelsSet;

                    datasets = [{
                        label: settings.datasetLabel || 'Nilai Indikator',
                        data: dataValues,
                        backgroundColor: bgColor,
                        borderColor: borderColor,
                        borderWidth: borderW,
                        pointBackgroundColor: borderColor
                    }];
                } else {
                    // Multi-Dataset (bertumpuk)
                    // Ekstrak nilai unik kategori (X-Axis) dan pengelompokan (Dimension)
                    const allLabels = [...new Set(dataTable.data.map(row => row[catIdx].formattedValue))];
                    const allGroups = [...new Set(dataTable.data.map(row => row[groupIdx].formattedValue))];

                    labels = allLabels;
                    activeGroups = allGroups;

                    // Buat map pencarian data: { Group: { Category: Value } }
                    const dataMap = {};
                    dataTable.data.forEach(row => {
                        const gVal = row[groupIdx].formattedValue;
                        const cVal = row[catIdx].formattedValue;
                        const vVal = row[valIdx].value;

                        if (!dataMap[gVal]) {
                            dataMap[gVal] = {};
                        }
                        dataMap[gVal][cVal] = vVal;
                    });

                    // Parse saved group colors
                    let groupColors = {};
                    if (settings.groupColors) {
                        try {
                            groupColors = JSON.parse(settings.groupColors);
                        } catch (e) {
                            console.error("Gagal men-parse groupColors:", e);
                        }
                    }

                    // Palet warna premium yang serasi
                    const PALETTE = [
                        { border: 'rgba(54, 162, 235, 1)', bg: 'rgba(54, 162, 235, 0.2)' },    // Biru
                        { border: 'rgba(75, 192, 192, 1)', bg: 'rgba(75, 192, 192, 0.2)' },    // Toska
                        { border: 'rgba(255, 99, 132, 1)', bg: 'rgba(255, 99, 132, 0.2)' },    // Merah
                        { border: 'rgba(255, 159, 64, 1)', bg: 'rgba(255, 159, 64, 0.2)' },    // Jingga
                        { border: 'rgba(153, 102, 255, 1)', bg: 'rgba(153, 102, 255, 0.2)' },  // Ungu
                        { border: 'rgba(255, 205, 86, 1)', bg: 'rgba(255, 205, 86, 0.2)' }     // Kuning
                    ];

                    datasets = allGroups.map((groupName, idx) => {
                        const dataValues = allLabels.map(label => {
                            const val = dataMap[groupName][label];
                            return val !== undefined ? val : 0;
                        });

                        let borderCol = groupColors[groupName];
                        let bgCol;

                        if (borderCol) {
                            bgCol = hexToRgba(borderCol, 0.2);
                        } else {
                            const color = PALETTE[idx % PALETTE.length];
                            borderCol = color.border;
                            bgCol = color.bg;
                        }

                        return {
                            label: groupName,
                            data: dataValues,
                            backgroundColor: bgCol,
                            borderColor: borderCol,
                            borderWidth: borderW,
                            pointBackgroundColor: borderCol
                        };
                    });
                }

                hideError();

                // 3. Render ke Chart.js
                const ctx = document.getElementById('radarCanvas').getContext('2d');
                
                if (myRadarChart) {
                    // Jika grafik sudah ada, tinggal update datanya (Animasi mulus)
                    myRadarChart.data.labels = labels;
                    myRadarChart.data.datasets = datasets;
                    myRadarChart.options.scales.r.suggestedMax = maxScale;
                    myRadarChart.update();
                } else {
                    // Jika baru pertama kali dimuat, buat objek grafik baru
                    myRadarChart = new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: labels,
                            datasets: datasets
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                r: {
                                    suggestedMin: 0,
                                    suggestedMax: maxScale,
                                    ticks: { font: { size: 10 } },
                                    pointLabels: { font: { size: 11, weight: 'bold' } }
                                }
                            }
                        }
                    });
                }
            } catch (err) {
                showError("Gagal mengambil data dari worksheet Tableau: " + err.message, "Gagal Mengambil Data");
            }
        }
    </script>
</body>
</html>
